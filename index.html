<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapshell</title>
  </head>
  <body>
    <div id="app">
      <div id="map" aria-label="Mapshell map"></div>
      <form id="command-form" class="panel" aria-label="Mapshell command input">
        <label for="command-input" class="sr-only">Command</label>
        <input
          id="command-input"
          name="command"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="show roads and buildings"
        />
        <button type="submit">Parse</button>
      </form>
      <section
        id="command-log"
        class="panel"
        aria-live="polite"
        aria-label="Parsed command log"
      ></section>
      <div id="status-bar" class="panel" aria-live="polite">Mapshell</div>
      <div
        id="loading-overlay"
        class="panel"
        role="status"
        aria-live="polite"
        aria-hidden="true"
      >
        Streaming new tiles.
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
